name: Publish Blog Post

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'auto = fetch from Notion, manual = use slug/prompt inputs'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - manual
      slug:
        description: 'Post slug (manual mode only)'
        required: false
        type: string
      prompt:
        description: 'Scene description for illustration (manual mode only)'
        required: false
        type: string
      vibe:
        description: 'Outfit vibe (smart ivy, rugged casual, summer ivy, etc.)'
        required: false
        type: string
      season:
        description: 'Season filter (summer, winter, spring, fall)'
        required: false
        type: string
      skip_image:
        description: 'Publish without generating an image'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/image-pipeline/requirements.txt anthropic

      - name: Publish blog post
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd scripts/image-pipeline
          ARGS=""
          if [ "${{ inputs.mode }}" = "manual" ]; then
            ARGS="--slug ${{ inputs.slug }} --prompt \"${{ inputs.prompt }}\""
          fi
          if [ -n "${{ inputs.vibe }}" ]; then
            ARGS="$ARGS --vibe \"${{ inputs.vibe }}\""
          fi
          if [ -n "${{ inputs.season }}" ]; then
            ARGS="$ARGS --season \"${{ inputs.season }}\""
          fi
          if [ "${{ inputs.skip_image }}" = "true" ]; then
            ARGS="$ARGS --skip-image"
          fi
          eval python publish.py $ARGS

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A src/content/ src/assets/images/posts/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto-publish blog post"
          git push
